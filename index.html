<script>
// ---- CLOUDINARY CONFIG ----
const CLOUD_NAME = 'dvptqqswl';
const UPLOAD_PRESET = 'footwear_uploads';
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

// ---- STATE ----
let db = {};
let editingModel = null;
let pendingImgFile = null;

// ---- LOAD / SAVE DB ----
function loadDB() {
  try {
    db = JSON.parse(localStorage.getItem('footwear_db') || '{}');
  } catch (e) {
    db = {};
  }
}

function saveDB() {
  localStorage.setItem('footwear_db', JSON.stringify(db));
}

loadDB();


// -------------------------------
// ✅ CLOUDINARY UPLOAD (FIXED)
// -------------------------------
async function uploadToCloudinary(file, modelName) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('folder', 'footwear_catalog');

  // 🔥 FIXED: stable ID = REPLACE IMAGE (NO STACKING)
  const cleanModel = modelName.replace(/[^a-zA-Z0-9]/g, '_');
  fd.append('public_id', `model_${cleanModel}`);

  fd.append('overwrite', 'true');

  const res = await fetch(CLOUDINARY_URL, {
    method: 'POST',
    body: fd
  });

  const data = await res.json();

  if (!res.ok) {
    console.error('Cloudinary Error:', data);
    throw new Error(data.error?.message || 'Upload failed');
  }

  return data.secure_url;
}


// -------------------------------
// TAB SWITCH
// -------------------------------
function tab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'catalog') renderCatalog();
  if (name === 'manage') renderManage();
}


// -------------------------------
// TOAST
// -------------------------------
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}


// -------------------------------
// SEARCH
// -------------------------------
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  const el = document.getElementById('searchResult');

  if (!q) {
    el.innerHTML = '';
    return;
  }

  const prod = db[q];

  if (!prod) {
    el.innerHTML = `<div class="empty"><div class="icon">🔎</div><p>No product found for <strong>${q}</strong></p></div>`;
    return;
  }

  const colors = (prod.colors || []).map(c => `<span class="color-tag">${c}</span>`).join('');

  el.innerHTML = `
    <div class="result-card">
      ${prod.image
        ? `<img class="img-area" src="${prod.image}" alt="Product"/>`
        : `<div class="img-placeholder"><div class="icon">👟</div><p>No image uploaded</p></div>`
      }

      <div class="result-body">
        <div class="model-title">${prod.model}</div>
        <div class="brand-sub">${prod.brandName || prod.brand || ''}</div>

        <div class="stock-badge">📦 Total Stock: ${prod.totalStock || 0}</div>

        <div class="info-grid">
          <div class="info-item"><label>Brand</label><p>${prod.brand || '—'}</p></div>
          <div class="info-item"><label>Supplier</label><p>${prod.supplier || '—'}</p></div>
          <div class="info-item"><label>Sole Type</label><p>${prod.sole || '—'}</p></div>
          <div class="info-item"><label>Type</label><p>${prod.type || '—'}</p></div>
        </div>

        ${colors ? `<div class="colors-list">${colors}</div>` : ''}

        <div class="upload-btn-wrap">
          <label class="upload-btn">
            📷 ${prod.image ? 'Change' : 'Upload'} Image
            <input type="file" accept="image/*"
              onchange="uploadImgForModel('${prod.model}', this)"
              class="hidden"/>
          </label>
        </div>
      </div>
    </div>
  `;
}


// -------------------------------
// IMAGE UPLOAD (FIXED)
// -------------------------------
async function uploadImgForModel(model, input) {
  const file = input.files[0];
  if (!file) return;

  try {
    const url = await uploadToCloudinary(file, model);

    // 🔥 FIX: store CLEAN URL only (NO cache tricks here)
    db[model].image = url;

    saveDB();
    toast('✅ Image updated (replaced old one)');

    doSearch();
    renderCatalog();
    renderManage();

  } catch (e) {
    console.error(e);
    toast('❌ Upload failed');
  }
}


// -------------------------------
// EXCEL UPLOAD
// -------------------------------
function handleExcel(input) {
  const file = input.files[0];
  if (!file) return;

  const r = new FileReader();

  r.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    const agg = {};

    rows.forEach(row => {
      const model = String(row['MODEL'] || '').trim().toUpperCase();
      if (!model) return;

      const qty = parseFloat(row['CLOSING STOCK'] || 0) || 0;

      if (!agg[model]) {
        agg[model] = {
          model,
          totalStock: 0,
          colors: new Set(),
          supplier: row['SUPPLIER'] || '',
          brand: row['BRAND'] || '',
          brandName: row['Brand Name'] || ''
        };
      }

      agg[model].totalStock += qty;

      const color = row['COLOR'];
      if (color) agg[model].colors.add(color);
    });

    Object.values(agg).forEach(a => {
      a.colors = [...a.colors];

      const existing = db[a.model];

      db[a.model] = {
        ...a,
        image: existing?.image || null
      };
    });

    saveDB();
    toast('✅ Stock updated');

    renderCatalog();
    renderManage();
  };

  r.readAsBinaryString(file);
}


// -------------------------------
// CATALOG
// -------------------------------
function renderCatalog() {
  const grid = document.getElementById('catalogGrid');

  const items = Object.values(db);

  grid.innerHTML = items.map(p => `
    <div class="cat-card" onclick="goSearch('${p.model}')">
      ${p.image
        ? `<img src="${p.image}" />`
        : `<div class="no-img">👟</div>`
      }
      <div class="cat-info">
        <div class="model-no">${p.model}</div>
        <div>${p.brandName || p.brand || ''}</div>
        <div>Stock: ${p.totalStock || 0}</div>
      </div>
    </div>
  `).join('');
}


// -------------------------------
// MANAGE
// -------------------------------
function renderManage() {
  const list = document.getElementById('manageList');

  list.innerHTML = Object.values(db).map(p => `
    <div class="manage-item">
      ${p.image
        ? `<img src="${p.image}" />`
        : `<div class="m-no-img">👟</div>`
      }

      <div class="m-info">
        <strong>${p.model}</strong>
        <span>${p.brand || ''}</span>
        <span>Stock: ${p.totalStock || 0}</span>
      </div>
    </div>
  `).join('');
}


// -------------------------------
function goSearch(model) {
  document.getElementById('searchInput').value = model;
  doSearch();
}

renderCatalog();
</script>
